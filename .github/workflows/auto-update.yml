name: Auto-update from CDN

on:
  repository_dispatch:
    types: [cdn-updated]

jobs:
  update-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Update version
        run: |
          NEW_VERSION="${{ github.event.client_payload.version }}"
          echo "Updating to version $NEW_VERSION"
          npm version "$NEW_VERSION" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ github.event.client_payload.version }}"
          git push

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "## Published @actovision/kaptha-creative-suite@${{ github.event.client_payload.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- CDN JS: \`${{ github.event.client_payload.js_url }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- CDN CSS: \`${{ github.event.client_payload.css_url }}\`" >> $GITHUB_STEP_SUMMARY
